name: Build ذكي APK

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools/latest
          cd $HOME/android-sdk/cmdline-tools/latest
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-*.zip
          rm commandlinetools-linux-*.zip
          mv cmdline-tools/* . 
          rm -rf cmdline-tools
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Create Project Structure
        run: |
          mkdir -p app/src/main/java/com/dhaki/ai
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/menu

          # settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "ذكي"
          include ':app'
          EOF

          # build.gradle project - هذا كان ناقص repositories
          cat > build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22'
              }
          }
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
          }
          EOF

          # app/build.gradle - نفس اللي قبل
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.dhaki.ai'
              compileSdk 34
              defaultConfig {
                  applicationId "com.dhaki.ai"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildFeatures { viewBinding true }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
              implementation 'com.google.code.gson:gson:2.11.0'
              implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
          }
          EOF

          # باقي الملفات نفسها AndroidManifest, layouts, kt ...
          # الصقهم زي ما هم من الرسالة اللي قبل

          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest package="com.dhaki.ai" xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <application android:label="ذكي" android:theme="@style/Theme.Dhaki">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
                  <activity android:name=".SettingsActivity"/>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources><string name="app_name">ذكي</string></resources>
          EOF
          cat > app/src/main/res/values/themes.xml << 'EOF'
          <resources><style name="Theme.Dhaki" parent="Theme.Material3.DayNight.NoActionBar"><item name="colorPrimary">#7C3AED</item></style></resources>
          EOF
          cat > app/src/main/res/menu_main.xml << 'EOF'
          <menu xmlns:android="http://schemas.android.com/apk/res/android"><item android:id="@+id/action_settings" android:title="الإعدادات"/></menu>
          EOF

          # انسخ activity_main.xml و activity_settings.xml و الـ Kotlin من الرسالة اللي قبل

      - name: Download Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          echo "$PWD/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Build APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ذكي-v1.0-debug
          path: app/build/outputs/apk/debug/app-debug.apk
