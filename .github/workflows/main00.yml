name: Build ذكي APK

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools/latest
          cd $HOME/android-sdk/cmdline-tools/latest
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-*.zip
          rm commandlinetools-linux-*.zip
          mv cmdline-tools/* . 
          rm -rf cmdline-tools
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          yes | $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          $HOME/android-sdk/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Create Project
        run: |
          mkdir -p app/src/main/java/com/dhaki/ai
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # 1. gradle.properties - هذا اللي كان ناقص
          cat > gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

          # 2. settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google() mavenCentral() gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google() mavenCentral() }
          }
          rootProject.name = "ذكي"
          include ':app'
          EOF

          # 3. build.gradle
          cat > build.gradle << 'EOF'
          buildscript {
              repositories { google() mavenCentral() }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
                  classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22'
              }
          }
          EOF

          # 4. app/build.gradle
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.dhaki.ai'
              compileSdk 34
              defaultConfig {
                  applicationId "com.dhaki.ai"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildFeatures { viewBinding true }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = '17' }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
              implementation 'com.google.code.gson:gson:2.11.0'
              implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
          }
          EOF

          # 5. AndroidManifest
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest package="com.dhaki.ai" xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES"/>
              <application android:label="ذكي" android:theme="@style/Theme.Material3.DayNight.NoActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
                  </activity>
                  <activity android:name=".SettingsActivity"/>
              </application>
          </manifest>
          EOF

          # 6. strings.xml
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources><string name="app_name">ذكي</string></resources>
          EOF

          # 7. activity_main.xml
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:padding="24dp">
              <TextView android:text="ذكي ✨" android:textSize="24sp" android:textStyle="bold"/>
              <EditText android:id="@+id/etInput" android:layout_width="match_parent" android:layout_height="120dp" android:hint="اسألني أي شيء..." android:layout_marginTop="16dp"/>
              <Button android:id="@+id/btnSend" android:layout_width="match_parent" android:layout_height="wrap_content" android:text="إرسال" android:layout_marginTop="8dp"/>
              <ProgressBar android:id="@+id/progress" android:layout_width="wrap_content" android:layout_height="wrap_content" android:layout_gravity="center" android:visibility="gone" android:layout_marginTop="16dp"/>
              <ScrollView android:layout_width="match_parent" android:layout_height="0dp" android:layout_weight="1" android:layout_marginTop="16dp">
                  <TextView android:id="@+id/tvResult" android:layout_width="match_parent" android:layout_height="wrap_content" android:textSize="16sp"/>
              </ScrollView>
          </LinearLayout>
          EOF

          # 8. MainActivity.kt
          cat > app/src/main/java/com/dhaki/ai/MainActivity.kt << 'KOTLIN'
          package com.dhaki.ai
          import android.os.Bundle
          import android.view.View
          import android.widget.*
          import androidx.appcompat.app.AppCompatActivity
          class MainActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)
                  val et = findViewById<EditText>(R.id.etInput)
                  val btn = findViewById<Button>(R.id.btnSend)
                  val tv = findViewById<TextView>(R.id.tvResult)
                  val progress = findViewById<ProgressBar>(R.id.progress)
                  btn.setOnClickListener {
                      progress.visibility = View.VISIBLE
                      tv.text = "جاري الاتصال بـ Meta AI...\n\n" + et.text.toString()
                      progress.visibility = View.GONE
                  }
              }
          }
          KOTLIN

          # 9. SettingsActivity.kt
          cat > app/src/main/java/com/dhaki/ai/SettingsActivity.kt << 'KOTLIN'
          package com.dhaki.ai
          import android.os.Bundle
          import androidx.appcompat.app.AppCompatActivity
          class SettingsActivity : AppCompatActivity() { 
              override fun onCreate(savedInstanceState: Bundle?) { 
                  super.onCreate(savedInstanceState) 
              } 
          }
          KOTLIN

      - name: Install Gradle
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          echo "$PWD/gradle-8.5/bin" >> $GITHUB_PATH

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ذكي-v1.0
          path: app/build/outputs/apk/debug/app-debug.apk
