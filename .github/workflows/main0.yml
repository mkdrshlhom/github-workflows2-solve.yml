name: Build Voice2PDF Pro

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-*.zip
          rm commandlinetools-linux-*.zip
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          yes | $HOME/android-sdk/cmdline-tools/cmdline-tools/bin/sdkmanager --licenses
          $HOME/android-sdk/cmdline-tools/cmdline-tools/bin/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Create project structure and source code
        run: |
          mkdir -p app/src/main/java/com/example/voice2pdf
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml

          # ---------- settings.gradle ----------
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "Voice2PDF"
          include ':app'
          EOF

          # ---------- build.gradle (root) ----------
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.0' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.20' apply false
          }
          EOF

          # ---------- app/build.gradle ----------
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.example.voice2pdf'
              compileSdk 34
              defaultConfig {
                  applicationId "com.example.voice2pdf"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildFeatures { viewBinding true }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              kotlinOptions {
                  jvmTarget = "1.8"
              }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.10.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation 'com.google.code.gson:gson:2.10.1'
              implementation 'com.squareup.okhttp3:okhttp:4.12.0'
              implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.2'
              implementation 'androidx.activity:activity-ktx:1.8.0'
          }
          EOF

          # ---------- AndroidManifest.xml ----------
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE"
                  android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"
                  android:maxSdkVersion="32"/>
              <uses-permission android:name="android.permission.READ_MEDIA_AUDIO"/>
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO"/>
              <uses-feature android:name="android.hardware.microphone" android:required="true"/>
              <application
                  android:allowBackup="true"
                  android:label="Voice2PDF Pro"
                  android:theme="@style/Theme.AppCompat.Light.DarkActionBar"
                  android:supportsRtl="true">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
                  <activity android:name=".SettingsActivity" android:label="إعدادات API"/>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/xml/file_paths.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <cache-path name="cache" path="."/>
              <external-cache-path name="external_cache" path="."/>
          </paths>
          EOF

          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">Voice2PDF Pro</string>
          </resources>
          EOF

          # ---------- activity_main.xml (Modern UI) ----------
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <androidx.constraintlayout.widget.ConstraintLayout
              xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@drawable/bg_gradient">

              <LinearLayout
                  android:id="@+id/headerBar"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:padding="16dp"
                  app:layout_constraintTop_toTopOf="parent">

                  <TextView
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:text="🎙️ Voice2PDF"
                      android:textSize="22sp"
                      android:textStyle="bold"
                      android:textColor="@android:color/white"/>

                  <Button
                      android:id="@+id/btnSettings"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="⚙️"
                      android:textColor="@android:color/white"/>
              </LinearLayout>

              <androidx.cardview.widget.CardView
                  android:id="@+id/cardRecorder"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:layout_margin="16dp"
                  app:cardCornerRadius="16dp"
                  app:cardElevation="4dp"
                  app:layout_constraintTop_toBottomOf="@id/headerBar">

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="vertical"
                      android:padding="16dp">

                      <Button
                          android:id="@+id/btnRecordToggle"
                          android:layout_width="match_parent"
                          android:layout_height="60dp"
                          android:text="🎤 اضغط لبدء التسجيل"
                          android:textSize="18sp"
                          android:backgroundTint="@android:color/holo_red_dark"/>

                      <View
                          android:id="@+id/recordingIndicator"
                          android:layout_width="20dp"
                          android:layout_height="20dp"
                          android:background="@drawable/circle_pulse"
                          android:layout_marginTop="8dp"
                          android:visibility="gone"/>
                  </LinearLayout>
              </androidx.cardview.widget.CardView>

              <androidx.cardview.widget.CardView
                  android:id="@+id/cardImport"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:layout_margin="16dp"
                  app:cardCornerRadius="16dp"
                  app:cardElevation="4dp"
                  app:layout_constraintTop_toBottomOf="@id/cardRecorder">

                  <Button
                      android:id="@+id/btnImportFile"
                      android:layout_width="match_parent"
                      android:layout_height="50dp"
                      android:text="📂 اختر ملف صوت/فيديو"
                      android:textSize="16sp"/>
              </androidx.cardview.widget.CardView>

              <androidx.cardview.widget.CardView
                  android:id="@+id/cardTranscription"
                  android:layout_width="match_parent"
                  android:layout_height="0dp"
                  android:layout_margin="16dp"
                  app:cardCornerRadius="16dp"
                  app:cardElevation="4dp"
                  app:layout_constraintTop_toBottomOf="@id/cardImport"
                  app:layout_constraintBottom_toTopOf="@id/btnSavePdf">

                  <LinearLayout
                      android:layout_width="match_parent"
                      android:layout_height="match_parent"
                      android:orientation="vertical"
                      android:padding="16dp">

                      <TextView
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:text="النص المستخرج"
                          android:textStyle="bold"
                          android:textSize="16sp"
                          android:layout_marginBottom="8dp"/>

                      <ProgressBar
                          android:id="@+id/progressBar"
                          android:layout_width="wrap_content"
                          android:layout_height="wrap_content"
                          android:layout_gravity="center"
                          android:visibility="gone"/>

                      <ScrollView
                          android:layout_width="match_parent"
                          android:layout_height="0dp"
                          android:layout_weight="1">

                          <TextView
                              android:id="@+id/tvTranscription"
                              android:layout_width="match_parent"
                              android:layout_height="wrap_content"
                              android:textSize="16sp"
                              android:lineSpacingExtra="4dp"/>
                      </ScrollView>
                  </LinearLayout>
              </androidx.cardview.widget.CardView>

              <Button
                  android:id="@+id/btnSavePdf"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="📄 حفظ PDF"
                  android:layout_margin="16dp"
                  android:enabled="false"
                  android:backgroundTint="@android:color/holo_green_dark"
                  app:layout_constraintBottom_toTopOf="@id/tvSignature"/>

              <TextView
                  android:id="@+id/tvSignature"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:textSize="14sp"
                  android:gravity="center"
                  android:padding="8dp"
                  app:layout_constraintBottom_toBottomOf="parent"/>
          </androidx.constraintlayout.widget.ConstraintLayout>
          EOF

          cat > app/src/main/res/layout/activity_settings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:padding="16dp">
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="مفتاح Gemini API"
                  android:textSize="18sp"
                  android:textStyle="bold"/>
              <EditText
                  android:id="@+id/etApiKey"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:hint="أدخل مفتاح API الخاص بك"
                  android:inputType="textPassword"
                  android:layout_marginTop="8dp"/>
              <Button
                  android:id="@+id/btnSave"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="حفظ المفتاح"
                  android:layout_marginTop="16dp"/>
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="احصل على مفتاح مجاني من:\nhttps://aistudio.google.com/apikey"
                  android:layout_marginTop="24dp"
                  android:textSize="14sp"
                  android:textColor="@android:color/darker_gray"/>
          </LinearLayout>
          EOF

          # ---------- Background drawables ----------
          cat > app/src/main/res/drawable/bg_gradient.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android">
              <gradient
                  android:angle="135"
                  android:startColor="#FF6B6B"
                  android:endColor="#4A90E2"/>
          </shape>
          EOF

          cat > app/src/main/res/drawable/circle_pulse.xml << 'EOF'
          <shape xmlns:android="http://schemas.android.com/apk/res/android"
              android:shape="oval">
              <solid android:color="#FF0000"/>
              <size android:width="20dp" android:height="20dp"/>
          </shape>
          EOF

          # ---------- MainActivity.kt ----------
          cat > app/src/main/java/com/example/voice2pdf/MainActivity.kt << 'KOTLIN'
          package com.example.voice2pdf

          import android.Manifest
          import android.animation.ObjectAnimator
          import android.content.Intent
          import android.content.SharedPreferences
          import android.content.pm.PackageManager
          import android.graphics.Color
          import android.graphics.Paint
          import android.graphics.pdf.PdfDocument
          import android.media.MediaRecorder
          import android.net.Uri
          import android.os.Build
          import android.os.Bundle
          import android.os.Environment
          import android.text.SpannableString
          import android.text.style.ForegroundColorSpan
          import android.util.Base64
          import android.view.View
          import android.widget.*
          import androidx.activity.result.contract.ActivityResultContracts
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.content.ContextCompat
          import androidx.lifecycle.lifecycleScope
          import com.google.gson.Gson
          import kotlinx.coroutines.*
          import okhttp3.*
          import okhttp3.MediaType.Companion.toMediaType
          import okhttp3.RequestBody.Companion.toRequestBody
          import java.io.*
          import java.text.SimpleDateFormat
          import java.util.*

          class MainActivity : AppCompatActivity() {

              private lateinit var btnRecordToggle: Button
              private lateinit var recordingIndicator: View
              private lateinit var btnImportFile: Button
              private lateinit var tvTranscription: TextView
              private lateinit var btnSavePdf: Button
              private lateinit var progressBar: ProgressBar
              private lateinit var btnSettings: Button
              private lateinit var tvSignature: TextView
              private lateinit var prefs: SharedPreferences

              private var mediaRecorder: MediaRecorder? = null
              private var isRecording = false
              private var audioFile: File? = null
              private var transcriptionText: String? = null

              private val filePickerLauncher = registerForActivityResult(
                  ActivityResultContracts.GetContent()
              ) { uri ->
                  if (uri != null) processFile(uri)
              }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_main)

                  btnRecordToggle = findViewById(R.id.btnRecordToggle)
                  recordingIndicator = findViewById(R.id.recordingIndicator)
                  btnImportFile = findViewById(R.id.btnImportFile)
                  tvTranscription = findViewById(R.id.tvTranscription)
                  btnSavePdf = findViewById(R.id.btnSavePdf)
                  progressBar = findViewById(R.id.progressBar)
                  btnSettings = findViewById(R.id.btnSettings)
                  tvSignature = findViewById(R.id.tvSignature)
                  prefs = getSharedPreferences("app_prefs", MODE_PRIVATE)

                  // Signature
                  val sign = "تم التطوير بواسطة زيد قائد 🫠"
                  tvSignature.text = rainbowText(sign)

                  // Permissions check
                  checkAudioPermission()

                  btnRecordToggle.setOnClickListener {
                      if (isRecording) stopRecording() else startRecording()
                  }

                  btnImportFile.setOnClickListener {
                      filePickerLauncher.launch("audio/* video/*")  // تبسيط الاختيار
                  }

                  btnSavePdf.setOnClickListener {
                      transcriptionText?.let { text ->
                          if (text.isNotBlank()) saveAsPdf(text)
                      }
                  }

                  btnSettings.setOnClickListener {
                      startActivity(Intent(this, SettingsActivity::class.java))
                  }
              }

              private fun checkAudioPermission() {
                  if (ContextCompat.checkSelfPermission(this, Manifest.permission.RECORD_AUDIO)
                      != PackageManager.PERMISSION_GRANTED) {
                      requestPermissions(arrayOf(Manifest.permission.RECORD_AUDIO), 100)
                  }
              }

              private fun startRecording() {
                  val apiKey = prefs.getString("api_key", "")
                  if (apiKey.isNullOrEmpty()) {
                      Toast.makeText(this, "أدخل مفتاح API أولاً", Toast.LENGTH_SHORT).show()
                      return
                  }
                  try {
                      audioFile = File(externalCacheDir, "recording_${System.currentTimeMillis()}.mp3")
                      mediaRecorder = MediaRecorder().apply {
                          setAudioSource(MediaRecorder.AudioSource.MIC)
                          setOutputFormat(MediaRecorder.OutputFormat.MPEG_4)
                          setAudioEncoder(MediaRecorder.AudioEncoder.AAC)
                          setOutputFile(audioFile!!.absolutePath)
                          prepare()
                          start()
                      }
                      isRecording = true
                      btnRecordToggle.text = "⏹️ إيقاف التسجيل"
                      recordingIndicator.visibility = View.VISIBLE
                      pulseIndicator()
                  } catch (e: Exception) {
                      Toast.makeText(this, "فشل بدء التسجيل: ${e.message}", Toast.LENGTH_SHORT).show()
                  }
              }

              private fun stopRecording() {
                  try {
                      mediaRecorder?.apply {
                          stop()
                          release()
                      }
                      mediaRecorder = null
                      isRecording = false
                      btnRecordToggle.text = "🎤 اضغط لبدء التسجيل"
                      recordingIndicator.visibility = View.GONE

                      audioFile?.let { file ->
                          if (file.length() > 0) {
                              processFile(Uri.fromFile(file))
                          } else {
                              Toast.makeText(this, "التسجيل فارغ", Toast.LENGTH_SHORT).show()
                          }
                      }
                  } catch (e: Exception) {
                      Toast.makeText(this, "خطأ في إيقاف التسجيل: ${e.message}", Toast.LENGTH_SHORT).show()
                  }
              }

              private fun pulseIndicator() {
                  val animator = ObjectAnimator.ofFloat(recordingIndicator, "alpha", 1f, 0.3f).apply {
                      duration = 600
                      repeatMode = ObjectAnimator.REVERSE
                      repeatCount = ObjectAnimator.INFINITE
                      start()
                  }
              }

              private fun processFile(uri: Uri) {
                  progressBar.visibility = View.VISIBLE
                  tvTranscription.text = ""
                  btnSavePdf.isEnabled = false

                  lifecycleScope.launch {
                      try {
                          val apiKey = prefs.getString("api_key", "")
                          if (apiKey.isNullOrEmpty()) {
                              Toast.makeText(this@MainActivity, "أدخل مفتاح API أولاً", Toast.LENGTH_SHORT).show()
                              return@launch
                          }
                          val text = withContext(Dispatchers.IO) {
                              transcribeAudio(uri, apiKey)
                          }
                          transcriptionText = text
                          tvTranscription.text = text
                          btnSavePdf.isEnabled = true
                      } catch (e: Exception) {
                          Toast.makeText(this@MainActivity, "خطأ: ${e.message}", Toast.LENGTH_SHORT).show()
                      } finally {
                          progressBar.visibility = View.GONE
                      }
                  }
              }

              private suspend fun transcribeAudio(uri: Uri, apiKey: String): String {
                  // Read file and encode to base64
                  val inputStream = contentResolver.openInputStream(uri) ?: return "تعذر فتح الملف"
                  val bytes = inputStream.readBytes()
                  inputStream.close()
                  val base64 = Base64.encodeToString(bytes, Base64.NO_WRAP)

                  // Determine MIME type (simplified)
                  val mimeType = contentResolver.getType(uri) ?: "audio/mpeg"

                  val url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=$apiKey"

                  val jsonBody = """
                  {
                    "contents": [{
                      "parts": [
                        {"text": "Transcribe the following audio/video exactly. Provide only the transcription in the language spoken. If multiple languages, output as is."},
                        {"inline_data": {"mime_type": "$mimeType", "data": "$base64"}}
                      ]
                    }]
                  }
                  """.trimIndent()

                  val client = OkHttpClient()
                  val requestBody = jsonBody.toRequestBody("application/json".toMediaType())
                  val request = Request.Builder().url(url).post(requestBody).build()

                  val response = client.newCall(request).execute()
                  if (!response.isSuccessful) {
                      return "خطأ API: ${response.code} - ${response.body?.string()}"
                  }
                  val responseBody = response.body?.string() ?: return "استجابة فارغة"
                  val geminiResponse = Gson().fromJson(responseBody, GeminiResponse::class.java)
                  return geminiResponse.candidates?.firstOrNull()?.content?.parts?.firstOrNull()?.text
                      ?: "لا توجد نتيجة"
              }

              private fun saveAsPdf(text: String) {
                  val fileName = "Voice2PDF_${SimpleDateFormat("yyyyMMdd_HHmmss", Locale.getDefault()).format(Date())}.pdf"
                  val file = if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                      File(Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_DOWNLOADS), fileName)
                  } else {
                      File(Environment.getExternalStorageDirectory(), "Download/$fileName")
                  }

                  try {
                      val document = PdfDocument()
                      val pageInfo = PdfDocument.PageInfo.Builder(595, 842, 1).create() // A4
                      val page = document.startPage(pageInfo)
                      val canvas = page.canvas
                      val paint = Paint().apply {
                          color = Color.BLACK
                          textSize = 14f
                          isAntiAlias = true
                      }

                      // Simple text wrapping (basic)
                      var y = 40f
                      val lines = text.split("\n")
                      for (line in lines) {
                          val paragraphs = line.chunked(80) // 80 chars per line
                          for (p in paragraphs) {
                              canvas.drawText(p, 40f, y, paint)
                              y += 20f
                              if (y > 800) {
                                  document.finishPage(page)
                                  // New page not implemented for simplicity; could be added
                                  return@saveAsPdf
                              }
                          }
                      }
                      document.finishPage(page)
                      document.writeTo(FileOutputStream(file))
                      document.close()
                      Toast.makeText(this, "تم الحفظ في: ${file.absolutePath}", Toast.LENGTH_LONG).show()
                  } catch (e: Exception) {
                      Toast.makeText(this, "فشل حفظ PDF: ${e.message}", Toast.LENGTH_SHORT).show()
                  }
              }

              private fun rainbowText(text: String): SpannableString {
                  val spannable = SpannableString(text)
                  val colors = arrayOf(Color.RED, Color.MAGENTA, Color.BLUE, Color.CYAN, Color.GREEN, Color.YELLOW)
                  for (i in text.indices) {
                      spannable.setSpan(ForegroundColorSpan(colors[i % colors.size]), i, i+1, SpannableString.SPAN_EXCLUSIVE_EXCLUSIVE)
                  }
                  return spannable
              }

              override fun onDestroy() {
                  mediaRecorder?.release()
                  mediaRecorder = null
                  super.onDestroy()
              }
          }

          data class GeminiResponse(val candidates: List<Candidate>?)
          data class Candidate(val content: Content?)
          data class Content(val parts: List<Part>?)
          data class Part(val text: String?)
          KOTLIN

          cat > app/src/main/java/com/example/voice2pdf/SettingsActivity.kt << 'KOTLIN'
          package com.example.voice2pdf

          import android.content.SharedPreferences
          import android.os.Bundle
          import android.widget.Button
          import android.widget.EditText
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity

          class SettingsActivity : AppCompatActivity() {
              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  setContentView(R.layout.activity_settings)

                  val etApiKey: EditText = findViewById(R.id.etApiKey)
                  val btnSave: Button = findViewById(R.id.btnSave)
                  val prefs = getSharedPreferences("app_prefs", MODE_PRIVATE)

                  etApiKey.setText(prefs.getString("api_key", ""))

                  btnSave.setOnClickListener {
                      val key = etApiKey.text.toString().trim()
                      if (key.isEmpty()) {
                          Toast.makeText(this, "أدخل مفتاح صالح", Toast.LENGTH_SHORT).show()
                          return@setOnClickListener
                      }
                      prefs.edit().putString("api_key", key).apply()
                      Toast.makeText(this, "تم حفظ المفتاح", Toast.LENGTH_SHORT).show()
                      finish()
                  }
              }
          }
          KOTLIN

      - name: Set up Gradle Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip
          export PATH=$PWD/gradle-8.5/bin:$PATH
          gradle wrapper --gradle-version 8.5
          chmod +x gradlew

      - name: Build with Gradle
        run: |
          echo "android.useAndroidX=true" > gradle.properties
          unset ANDROID_HOME
          export ANDROID_HOME=$HOME/android-sdk
          export ANDROID_SDK_ROOT=$HOME/android-sdk
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Voice2PDF-Pro
          path: app/build/outputs/apk/debug/app-debug.apk
